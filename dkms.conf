PACKAGE_NAME="nvidia"

_source_dir="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd -P)"
PACKAGE_VERSION="$(git -C "$_source_dir" describe --tags --dirty --always 2>/dev/null)"
if [ -z "$PACKAGE_VERSION" ]; then
    PACKAGE_VERSION="$(sed -n 's/^NVIDIA_VERSION[[:space:]]*=[[:space:]]*//p' "$_source_dir/version.mk" | head -n 1)"
fi

AUTOINSTALL="yes"

MAKE[0]="'make' KERNEL_UNAME=${kernelver} modules"

BUILT_MODULE_NAME[0]="nvidia"
BUILT_MODULE_LOCATION[0]="kernel-open/"
DEST_MODULE_LOCATION[0]="/kernel/drivers/char/drm"

BUILT_MODULE_NAME[1]="nvidia-modeset"
BUILT_MODULE_LOCATION[1]="kernel-open/"
DEST_MODULE_LOCATION[1]="/kernel/drivers/char/drm"

BUILT_MODULE_NAME[2]="nvidia-drm"
BUILT_MODULE_LOCATION[2]="kernel-open/"
DEST_MODULE_LOCATION[2]="/kernel/drivers/char/drm"

BUILT_MODULE_NAME[3]="nvidia-uvm"
BUILT_MODULE_LOCATION[3]="kernel-open/"
DEST_MODULE_LOCATION[3]="/kernel/drivers/char/drm"

BUILT_MODULE_NAME[4]="nvidia-peermem"
BUILT_MODULE_LOCATION[4]="kernel-open/"
DEST_MODULE_LOCATION[4]="/kernel/drivers/char/drm"
